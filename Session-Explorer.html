        const sectionHtml = renderedSections.map((section) => section.html).join("");
        const meta = [
          "生成于 " + formatDate(memory.generated_at, true),
          "总结到 " + String(memory.summarized_turn_count || 0) + " 个提问",
          memory.delta_turns ? "新增 " + String(memory.delta_turns) + " 个提问待更新" : "暂无新增提问"
        ].join(" · ");
        return '<div class="memory-body"><div class="memory-content">' + (hasMappedContent ? sectionHtml : fallback) + '</div><div class="memory-subtitle">' + escapeHtml(meta) + '</div></div>';
      }

      function renderDetail(summary, detail) {
        if (!summary) {
          els.detailRoot.innerHTML = '<div class="empty-state">左侧选一条会话。<br>如果刚刷新完数据，可以先清空筛选再看。</div>';
          els.detailMetaBar.innerHTML = "";
          transcriptMarks = [];
          activeMatchIndex = -1;
          updateMatchNav();
          els.copyResumeButton.disabled = true;
          els.replayEditorButton.disabled = true;
          els.memoryButton.disabled = true;
          els.outlineButton.disabled = true;
          renderMemoryPanel(null, null);
          return;
        }

        const selected = detail || summary;
        const cwd = selected.cwd || selected.project || "";
        const key = sessionKey(selected);
        els.copyResumeButton.disabled = false;
        els.replayEditorButton.disabled = !state.apiMode || state.openingReplayEditorKey === key;
        els.memoryButton.disabled = false;
        els.outlineButton.disabled = false;
        els.copyResumeButton.textContent = selected.source_kind === "claude_code" ? "复制 Claude resume 命令" : "复制 resume 命令";
        els.replayEditorButton.textContent = state.openingReplayEditorKey === key ? "打开中..." : "打开 Replay Editor";

        els.detailMetaBar.innerHTML = [
          '<span class="source-badge" data-source="' + escapeHtml(selected.source_kind) + '">' + escapeHtml(selected.source_label || "") + '</span>',
          '<span class="meta-pill">最新 ' + escapeHtml(formatDate(selected.updated_at || selected.started_at, true)) + '</span>',
          '<span class="meta-pill">' + escapeHtml(String(selected.turn_count || 0)) + ' 提问</span>',
          selected.message_count ? '<span class="meta-pill">' + escapeHtml(String(selected.message_count)) + ' 条消息</span>' : "",
          selected.session_id ? '<span class="meta-pill id-pill" title="' + escapeHtml(selected.session_id) + '">ID ' + escapeHtml(shortSessionId(selected.session_id)) + '</span>' : "",
          selected.forked_from_id ? '<span class="meta-pill id-pill" title="' + escapeHtml(selected.forked_from_id) + '">Fork ' + escapeHtml(shortSessionId(selected.forked_from_id)) + '</span>' : "",
          cwd ? '<span class="meta-pill cwd-pill" title="' + escapeHtml(cwd) + '">目录 ' + escapeHtml(cwd) + '</span>' : ""
        ].filter(Boolean).join("");

        if (!detail && state.apiMode) {
          els.detailRoot.innerHTML = '<div class="empty-state" style="min-height: 220px;">正在加载这条会话的完整记录...</div>';
          renderMemoryPanel(summary, null);
          transcriptMarks = [];
          activeMatchIndex = -1;
          updateMatchNav();
          return;
        }

        els.detailRoot.innerHTML = renderTranscript(selected, getQueryTokens());
        renderMemoryPanel(selected, selected);
        transcriptMarks = Array.from(els.detailRoot.querySelectorAll(".transcript-stack mark"));
        activeMatchIndex = -1;
        if (state.apiMode && !state.summaryCache.has(sessionKey(selected)) && !state.summaryErrors.has(sessionKey(selected)) && state.loadingSummaryKey !== sessionKey(selected)) {
          loadSummary(selected);
        }
        if (getQueryTokens().length && transcriptMarks.length) focusMatch(0);
        else {
          els.detailRoot.scrollTop = 0;
          updateMatchNav();
        }
      }

      function renderOutline(summary, detail) {
        const selected = detail || summary;
        if (!selected || !Array.isArray(selected.user_turns) || !selected.user_turns.length) {
          els.outlineList.innerHTML = '<li class="empty-state" style="min-height: 220px;">这条会话没有抓到可用的用户提问目录。</li>';
          els.outlineSubtitle.textContent = "没有可展示的用户提问";
          return;
        }

        const tokens = state.outlineQuery.trim().toLowerCase().split(/\s+/).filter(Boolean);
        const turns = tokens.length
          ? selected.user_turns.filter((turn) => tokens.every((token) => String(turn.text || "").toLowerCase().includes(token)))
          : selected.user_turns;
        const displayTurns = turns.slice().reverse();
        els.outlineSubtitle.textContent = (selected.title_clean || selected.session_id) + " · 最新在前 · " + turns.length + " / " + selected.user_turns.length + " 个用户提问";

        if (!displayTurns.length) {
          els.outlineList.innerHTML = '<li class="empty-state" style="min-height: 220px;">这个目录里没有匹配的用户提问。</li>';
          return;
        }

        els.outlineList.innerHTML = displayTurns.map((turn) => {
          return '' +
            '<li class="outline-item">' +
              '<button class="outline-jump" type="button" data-outline-turn="' + escapeHtml(turn.index || "") + '">' +
                '<div class="outline-index">' + escapeHtml(turn.index || "") + '</div>' +
                '<div>' +
                  '<div class="outline-text">' + highlightText(turn.text || "", tokens) + '</div>' +
                  '<div class="outline-time">' + escapeHtml(formatDate(turn.timestamp, true)) + '</div>' +
                '</div>' +
              '</button>' +
            '</li>';
        }).join("");
      }

      async function loadSummary(summary) {
        if (!summary || !state.apiMode) return;
        const key = sessionKey(summary);
        if (state.summaryCache.has(key) || state.loadingSummaryKey === key) return;
        state.loadingSummaryKey = key;
        renderDetail(summary, state.detailCache.get(key));
        try {
          const response = await fetch("/api/session/" + encodeURIComponent(summary.source_kind) + "/" + encodeURIComponent(summary.detail_id || summary.session_id) + "/summary", { cache: "no-store" });
          if (response.status === 404) {
            state.summaryCache.set(key, null);
            updateSummaryStatusForKey(key, null);
          } else if (!response.ok) {
            const body = await response.json().catch(() => ({}));
            throw new Error(body.error || "总结缓存读取失败");
          } else {
            const body = await response.json();
            state.summaryCache.set(key, body);
            updateSummaryStatusForKey(key, body);
          }
          state.summaryErrors.delete(key);
        } catch (error) {
          state.summaryErrors.set(key, error && error.message ? error.message : String(error));
        } finally {
          state.loadingSummaryKey = "";
          const filtered = getFilteredSessions();
          const current = getSelectedSummary(filtered);
          if (current && sessionKey(current) === key) render();
        }
      }

      async function generateSummary() {
        const detail = currentSelectedDetail();
        if (!detail || !state.apiMode) return;
        const key = sessionKey(detail);
        if (state.generatingSummaryKey) return;
        state.generatingSummaryKey = key;
        state.summaryErrors.delete(key);
        render();
        closeMemory();
        setStatus("正在后台生成上下文工程卡", "");
        try {
          const response = await fetch("/api/session/" + encodeURIComponent(detail.source_kind) + "/" + encodeURIComponent(detail.detail_id || detail.session_id) + "/summary", {
            method: "POST",
            cache: "no-store"
          });
          const body = await response.json().catch(() => ({}));
          if (!response.ok) throw new Error(body.error || "Kimi 总结生成失败");
          state.summaryCache.set(key, body);
          updateSummaryStatusForKey(key, body);
          state.summaryErrors.delete(key);
          setStatus("上下文工程卡已更新", "");
        } catch (error) {
          state.summaryErrors.set(key, error && error.message ? error.message : String(error));
          setStatus("总结生成失败", "error");
        } finally {
          state.generatingSummaryKey = "";
          const filtered = getFilteredSessions();
          const current = getSelectedSummary(filtered);
          if (current && sessionKey(current) === key) render();
        }
      }

      function copyCurrentSummary() {
        const detail = currentSelectedDetail();
        if (!detail) return;
        const memory = state.summaryCache.get(sessionKey(detail));
        if (memory && memory.summary) copyText(memory.summary);
      }

      function toggleMemoryCard() {
        const detail = currentSelectedDetail();
        if (!detail) return;
        const key = sessionKey(detail);
        if (state.collapsedMemory.has(key)) state.collapsedMemory.delete(key);
        else state.collapsedMemory.add(key);
        render();
      }

      function jumpToUserTurn(turnIndex) {
        closeOutline();
        const numericTurn = Number(turnIndex || 0);
        const cards = Array.from(els.detailRoot.querySelectorAll("[data-user-turn]"));
        let target = cards.find((card) => Number(card.getAttribute("data-user-turn") || 0) === numericTurn);
        if (!target && numericTurn > 0) {
          target = cards.find((card) => Number(card.getAttribute("data-user-turn") || 0) > numericTurn) || cards[cards.length - 1];
          if (target) setStatus("这条目录项是隐藏的系统上下文，已跳到最近的可见提问", "busy");
        }
        if (!target) return;
        cards.forEach((card) => card.classList.remove("jump-focus"));
        target.classList.add("jump-focus");
        target.scrollIntoView({ block: "start", behavior: "smooth" });
        window.setTimeout(() => target.classList.remove("jump-focus"), 1800);
      }

      async function loadDetail(summary) {
        if (!summary) return;
        const key = sessionKey(summary);
        if (state.detailCache.has(key)) return;
        if (!state.apiMode) {
          state.detailCache.set(key, summary);
          return;
        }

        state.loadingDetailKey = key;
        renderDetail(summary, null);
        try {
          const response = await fetch("/api/session/" + encodeURIComponent(summary.source_kind) + "/" + encodeURIComponent(summary.detail_id || summary.session_id), { cache: "no-store" });
          if (!response.ok) throw new Error("detail request failed");
          const detail = normalizeSession(await response.json());
          state.detailCache.set(key, detail);
        } catch (error) {
          state.detailCache.set(key, {
            ...summary,
            transcript_items: [],
            user_turns: []
          });
          setStatus("详情加载失败", "error");
        } finally {
          state.loadingDetailKey = "";
          const filtered = getFilteredSessions();
          const current = getSelectedSummary(filtered);
          if (current && sessionKey(current) === key) render();
        }
      }

      function render() {
        const filtered = getFilteredSessions();
        ensureSelection(filtered);
        const selected = getSelectedSummary(filtered);
        const detail = selected ? state.detailCache.get(sessionKey(selected)) : null;
        renderList(filtered);
        renderDetail(selected, detail);
        renderOutline(selected, detail);
        if (selected && !detail) loadDetail(selected);
      }

      async function loadIndex(preserveSelection) {
        setStatus("加载索引中", "busy");
        try {
          const response = await fetch("/api/index", { cache: "no-store" });
          if (!response.ok) throw new Error("api index unavailable");
          const catalog = await response.json();
          state.apiMode = true;
          applyCatalog(catalog, preserveSelection);
          setStatus("本地服务已连接", "");
        } catch {
          state.apiMode = false;
          applyCatalog({ sessions: [], projects: [] }, preserveSelection);
          setStatus("本地服务不可用，请用 Open-SessionExplorer.bat 打开", "error");
        }
      }

      function applyCatalog(catalog, preserveSelection) {
        const previousKey = preserveSelection ? state.selectedKey : "";
        state.catalog = catalog || { sessions: [], projects: [] };
        state.sessions = Array.isArray(state.catalog.sessions)
          ? state.catalog.sessions.map(normalizeSession).sort((a, b) => b._updatedMs - a._updatedMs)
          : [];
        state.lastGeneratedAt = state.catalog.generated_at || "";
        state.lastRefreshAt = state.lastGeneratedAt || new Date().toISOString();
        scheduleNextAutoRefresh(Date.now());
        state.detailCache.clear();
        state.summaryCache.clear();
        state.summaryErrors.clear();
        state.selectedKey = previousKey && state.sessions.some((session) => sessionKey(session) === previousKey)
          ? previousKey
          : (state.sessions[0] ? sessionKey(state.sessions[0]) : "");
        state.visibleLimit = 100;
        buildProjectOptions();
        render();
      }

      function statusWithCatalog(baseText) {
        const summary = catalogSummaryText();
        return summary ? (baseText ? baseText + " · " + summary : summary) : baseText;
      }

      async function refreshLatest() {
        if (!state.apiMode) {
          window.location.reload();
          return;
        }
        if (state.generatingSummaryKey || state.lastKnownRunning) return;
        els.refreshButton.disabled = true;
        setStatus("刷新中 · 上次 " + formatDate(state.lastRefreshAt, true), "busy");
        try {
          await fetch("/api/refresh", { method: "POST", cache: "no-store" });
          state.lastKnownRunning = true;
        } catch {
          setStatus("刷新请求失败", "error");
          els.refreshButton.disabled = false;
        }
      }

      async function pollStatus() {
        if (!state.apiMode) return;
        try {
          const response = await fetch("/api/status", { cache: "no-store" });
          if (!response.ok) return;
          const status = await response.json();
          state.lastKnownRunning = Boolean(status.running);
          els.refreshButton.disabled = Boolean(status.running);
          if (status.running) {
            setStatus(status.phase === "exporting" ? "同步本机记录中" : "重建索引中", "busy");
            return;
          }
          if (status.last_error) {
            setStatus("上次刷新失败", "error");
            return;
          }
          if (status.generated_at && status.generated_at !== state.lastGeneratedAt) {
            state.lastRefreshAt = status.generated_at;
            scheduleNextAutoRefresh(Date.now());
            await loadIndex(true);
            return;
          }
          const nextText = state.nextAutoRefreshAt ? " · 下次自动 " + formatDuration(state.nextAutoRefreshAt - Date.now()) : "";
          const lastText = state.lastRefreshAt ? " · 上次 " + formatDate(state.lastRefreshAt, true) : "";
          setStatus(statusWithCatalog((status.has_new_data ? "已有新数据，可刷新" : "本地服务已连接") + lastText + nextText), status.has_new_data ? "busy" : "");
        } catch {
          setStatus("本地服务断开", "error");
        }
      }

      async function maybeAutoRefresh() {
        if (!state.apiMode || state.generatingSummaryKey || state.lastKnownRunning) return;
        if (!state.nextAutoRefreshAt) scheduleNextAutoRefresh(Date.now());
        if (Date.now() < state.nextAutoRefreshAt) return;
        await refreshLatest();
        scheduleNextAutoRefresh(Date.now());
      }

      function showCopied(button) {
        if (!button) return;
        const original = button.textContent;
        button.textContent = "已复制";
        window.setTimeout(() => { button.textContent = original; }, 1200);
      }

      function fallbackCopy(text, button) {
        const textarea = document.createElement("textarea");
        textarea.value = text;
        textarea.style.position = "fixed";
        textarea.style.opacity = "0";
        document.body.appendChild(textarea);
        textarea.focus();
        textarea.select();
        try {
          document.execCommand("copy");
          showCopied(button || els.copyResumeButton);
        } finally {
          document.body.removeChild(textarea);
        }
      }

      function copyText(text, button) {
        if (!text) return;
        if (navigator.clipboard && window.isSecureContext) {
          navigator.clipboard.writeText(text).then(() => {
            showCopied(button || els.copyResumeButton);
          }).catch(() => fallbackCopy(text, button));
          return;
        }
        fallbackCopy(text, button);
      }

      async function openReplayEditor() {
        const filtered = getFilteredSessions();
        const selected = getSelectedSummary(filtered);
        if (!selected || !state.apiMode) return;

        const key = sessionKey(selected);
        const popup = window.open("about:blank", "_blank");
        state.openingReplayEditorKey = key;
        setStatus("正在打开 Replay Editor", "busy");
        render();
        try {
          const response = await fetch(
            "/api/session/" + encodeURIComponent(selected.source_kind) + "/" + encodeURIComponent(selected.detail_id || selected.session_id) + "/replay-editor",
            { method: "POST", cache: "no-store" }
          );
          const body = await response.json().catch(() => ({}));
          if (!response.ok) throw new Error(body.error || "Replay Editor 打开失败");
          if (popup) popup.location.href = body.url;
          else window.open(body.url, "_blank");
          setStatus((body.reused ? "已复用" : "已启动") + " Replay Editor · " + body.url, "");
        } catch (error) {
          if (popup) popup.close();
          setStatus(error && error.message ? error.message : String(error), "error");
        } finally {
          state.openingReplayEditorKey = "";
          render();
        }
      }

      function openOutline() {
        els.outlineBackdrop.classList.add("open");
        els.outlineBackdrop.setAttribute("aria-hidden", "false");
        window.setTimeout(() => {
          els.outlineSearchInput.focus();
          els.outlineSearchInput.select();
        }, 0);
      }

      function closeOutline() {
        els.outlineBackdrop.classList.remove("open");
        els.outlineBackdrop.setAttribute("aria-hidden", "true");
      }

      function openMemory() {
        const filtered = getFilteredSessions();
        const selected = getSelectedSummary(filtered);
        renderMemoryPanel(selected, selected ? state.detailCache.get(sessionKey(selected)) : null);
        els.memoryBackdrop.classList.add("open");
        els.memoryBackdrop.setAttribute("aria-hidden", "false");
      }

      function closeMemory() {
        els.memoryBackdrop.classList.remove("open");
        els.memoryBackdrop.setAttribute("aria-hidden", "true");
      }

      els.searchInput.addEventListener("input", (event) => {
        state.query = event.target.value || "";
        state.visibleLimit = 100;
        window.clearTimeout(searchTimer);
        searchTimer = window.setTimeout(render, 150);
      });
      els.summaryFilter.addEventListener("change", (event) => { state.summaryStatus = event.target.value; state.visibleLimit = 100; render(); });
      els.scopeFilter.addEventListener("change", (event) => { state.sessionScope = event.target.value; state.visibleLimit = 100; render(); });
      els.projectFilter.addEventListener("change", (event) => { state.project = event.target.value; state.visibleLimit = 100; render(); });
      els.sourceFilter.addEventListener("change", (event) => { state.source = event.target.value; state.visibleLimit = 100; render(); });
      els.typeFilter.addEventListener("change", (event) => { state.sessionType = event.target.value; state.visibleLimit = 100; render(); });
      els.refreshButton.addEventListener("click", refreshLatest);
      function handleSummaryAction(event) {
        const actionButton = event.target.closest("[data-action]");
        if (!actionButton) return;
        const action = actionButton.getAttribute("data-action");
        if (action === "summary-generate") generateSummary();
        if (action === "summary-copy") {
          const detail = currentSelectedDetail();
          const memory = detail ? state.summaryCache.get(sessionKey(detail)) : null;
          if (memory && memory.summary) copyText(memory.summary, actionButton);
        }
        if (action === "summary-copy-context") {
          const detail = currentSelectedDetail();
          const memory = detail ? state.summaryCache.get(sessionKey(detail)) : null;
          const contextCard = buildContextEngineeringText(detail, memory);
          if (contextCard) copyText(contextCard, actionButton);
        }
        if (action === "copy-cwd") {
          const detail = currentSelectedDetail();
          if (detail && detail.cwd) copyText(detail.cwd, actionButton);
        }
        if (action === "summary-toggle") toggleMemoryCard();
        if (action === "transcript-toggle") {
          const card = actionButton.closest(".transcript-card");
          const textBlock = card ? card.querySelector(".transcript-text[data-expandable='true']") : null;
          if (!textBlock) return;
          const collapsed = textBlock.classList.toggle("collapsed");
          actionButton.textContent = collapsed ? "展开" : "收起";
        }
      }

      els.detailRoot.addEventListener("click", handleSummaryAction);
      els.memoryRoot.addEventListener("click", handleSummaryAction);
      els.clearButton.addEventListener("click", () => {
        state.query = "";
        state.summaryStatus = "all";
        state.sessionScope = "current";
        state.project = "all";
        state.source = "codex";
        state.sessionType = "all";
        state.visibleLimit = 100;
        els.searchInput.value = "";
        els.summaryFilter.value = "all";
        els.scopeFilter.value = "current";
        els.projectFilter.value = "all";
        els.sourceFilter.value = "codex";
        els.typeFilter.value = "all";
        render();
      });
      els.outlineSearchInput.addEventListener("input", (event) => {
        state.outlineQuery = event.target.value || "";
        const filtered = getFilteredSessions();
        const selected = getSelectedSummary(filtered);
        renderOutline(selected, selected ? state.detailCache.get(sessionKey(selected)) : null);
      });
      els.outlineList.addEventListener("click", (event) => {
        const button = event.target.closest("[data-outline-turn]");
        if (!button) return;
        jumpToUserTurn(button.getAttribute("data-outline-turn"));
      });
      els.copyResumeButton.addEventListener("click", () => {
        const filtered = getFilteredSessions();
        const selected = getSelectedSummary(filtered);
        const detail = selected ? state.detailCache.get(sessionKey(selected)) : null;
        copyText((detail || selected || {}).resume_command || "");
      });
      els.replayEditorButton.addEventListener("click", openReplayEditor);
      els.prevMatchButton.addEventListener("click", () => focusMatch(activeMatchIndex - 1));
      els.nextMatchButton.addEventListener("click", () => focusMatch(activeMatchIndex + 1));
      els.memoryButton.addEventListener("click", openMemory);
      els.outlineButton.addEventListener("click", openOutline);
      els.closeMemoryButton.addEventListener("click", closeMemory);
      els.closeOutlineButton.addEventListener("click", closeOutline);
      els.outlineBackdrop.addEventListener("click", (event) => { if (event.target === els.outlineBackdrop) closeOutline(); });
      els.memoryBackdrop.addEventListener("click", (event) => { if (event.target === els.memoryBackdrop) closeMemory(); });
      document.addEventListener("keydown", (event) => {
        if (event.key !== "Escape") return;
        closeOutline();
        closeMemory();
      });
      document.addEventListener("visibilitychange", () => {
        scheduleNextAutoRefresh(Date.now());
        pollStatus();
      });

      loadIndex(false).then(() => {
        pollStatus();
        window.setInterval(() => {
          pollStatus();
          maybeAutoRefresh();
        }, 15000);
      });
    })();
  </script>
</body>
</html>
